<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="browse_services.html">Browse</a>
        <a href="post_service.html">Post Service</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
    </nav>
    <h1>Register for Student Services Marketplace</h1>
    
    <form action="register_action.php" method="POST">
        <fieldset>
            <legend>User Information</legend>
            <label for="fullName">Full Name:</label><br>
            <input type="text" id="fullName" name="fullName" required><br><br>
            
            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            
            <label for="phone_number">Phone Number:</label><br>
            <input type="tel" id="phone_number" name="phone_number" maxlength="15"><br><br>
            
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" required>
            <div style="margin-top: 0.5rem; margin-bottom: 1.5rem;">
                <input type="checkbox" id="showPassword" onclick="document.getElementById('password').type = this.checked ? 'text' : 'password'">
                <label for="showPassword" style="font-size: 0.9rem; font-weight: normal; cursor: pointer;">Show password</label>
            </div>
        </fieldset>
        
        <fieldset>
            <legend>Select Role</legend>
            <input type="radio" id="roleCustomer" name="role" value="customer" required>
            <label for="roleCustomer">Customer (Looking for services)</label><br>
            
            <input type="radio" id="roleProvider" name="role" value="provider" required>
            <label for="roleProvider">Service Provider (Offering services)</label><br>
        </fieldset>
        <br>
        
        <input type="submit" value="Register">
    </form>
    
    <p>Already have an account? <a href="login.html">Login here</a></p>
    <script src="persist_user.js"></script>
</body>
</html>
